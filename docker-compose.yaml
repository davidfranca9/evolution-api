version: '3.8'

services:
  api:
    container_name: evolution_api
    image: 'evoapicloud/evolution-api:latest'
    restart: always
    ports:
      - '127.0.0.1:8080:8080'
    volumes:
      - 'evolution_instances:/evolution/instances'
    env_file:
      - .env
    expose:
      - '8080'

volumes:
  evolution_instances: null
