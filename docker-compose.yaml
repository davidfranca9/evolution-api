version: '3.8'
services:
  api:
    image: 'evoapicloud/evolution-api:latest'
    restart: always
    depends_on:
      - redis
    volumes:
      - 'evolution_instances:/evolution/instances'
    expose:
      - '8080'

  redis:
    image: 'redis:latest'
    restart: always
    command: 'redis-server --port 6379 --appendonly yes'
    volumes:
      - 'evolution_redis:/data'
    expose:
      - '6379'

volumes:
  evolution_instances: null
  evolution_redis: null
